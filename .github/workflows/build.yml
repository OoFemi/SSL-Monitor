name: Build, Test, Tag, and Push SSL‑Monitor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # ✅ allows pushing commits and tags

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ✅ use built‑in token

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --stacktrace

      - name: Run tests
        run: ./gradlew test

      - name: Commit build artifacts to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add build/libs/*.jar
          git commit -m "Auto-build: add latest JAR" || echo "No changes to commit"
          git push origin main


  tag:
    runs-on: ubuntu-latest
    needs: build

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          VERSION="v1.$(date +'%Y%m%d%H%M')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Output version
        run: 'echo "Generated version: ${{ steps.version.outputs.version }}"'


  push-image:
    runs-on: ubuntu-latest
    needs: [build, tag]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          VERSION=${{ needs.tag.outputs.version }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ssl-monitor:latest .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ssl-monitor:$VERSION .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ssl-monitor:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ssl-monitor:$VERSION
