<!DOCTYPE html>
<html>
<head>
  <title>Logs – FOB Monitor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav class="top-nav">
  <a href="/overview.html">Overview</a>
  <a href="/admin.html">Admin</a>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/logs.html">Logs</a>
</nav>

<h1>Logs</h1>

<p style="margin-left:20px;">Enter URL to view history:</p>

<input id="logUrl" style="margin-left:20px;" placeholder="https://example.com">
<button onclick="loadLogs()">Load</button>

<pre id="logOutput" style="margin:20px;background:white;padding:20px;border-radius:8px;"></pre>

<script>
function loadLogs() {
  const url = document.querySelector("#logUrl").value;
  fetch(`/api/history?url=${encodeURIComponent(url)}`)
    .then(res => res.json())
    .then(lines => {
      document.querySelector("#logOutput").textContent = lines.join("\n");
    });
}
</script>

</body>
</html>
