<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FOB Monitor • Logs</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1A1A1A;
            --card: #ffffff;
            --border: #e0e0e0;
            --shadow: 0 8px 20px rgba(0,0,0,0.04);
            --accent: #D32F2F;
            --accent-dark: #B71C1C;
            --accent-light: #FFCDD2;
        }
        body.dark {
            --bg: #121212;
            --text: #f5f5f5;
            --card: #1e1e1e;
            --border: #333;
            --shadow: none;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.25s ease, color 0.25s ease;
        }
        .topbar {
            height: 56px;
            background: var(--accent);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar-logo img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #ffffff;
            padding: 4px;
        }
        .topbar-title {
            font-weight: 600;
            font-size: 15px;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-outline {
            font-size: 12px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.4);
            background: transparent;
            color: #ffffff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.15);
        }
        .container {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px 32px 16px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }
        p.subtitle {
            margin-top: 0;
            font-size: 13px;
            color: #666;
        }
        .log-card {
            background: var(--card);
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .log-header h2 {
            margin: 0;
            font-size: 15px;
        }
        .log-header small {
            font-size: 11px;
            color: #777;
        }
        pre {
            margin: 0;
            font-family: "Consolas", "SF Mono", Menlo, monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 70vh;
            overflow-y: auto;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            background: var(--accent-light);
            color: var(--accent-dark);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">
                <img src="logo.png" alt="FOB Logo">
            </div>
            <div class="topbar-title">FOB Monitor • Logs</div>
        </div>

        <div class="topbar-actions">
            <button class="btn-outline" onclick="location.href='/'">← Back to Dashboard</button>
            <button class="btn-outline" onclick="toggleTheme()" id="themeToggle">🌙 Dark Mode</button>
        </div>
    </div>

    <div class="container">
        <h1>System Logs</h1>
        <p class="subtitle">
            Raw uptime and SSL check entries. Use this view for quick diagnostics and audit trails.
        </p>

        <div class="log-card">
            <div class="log-header">
                <div>
                    <h2>Latest entries</h2>
                    <small>Appends on every health check cycle.</small>
                </div>
                <div class="badge">Live log file</div>
            </div>
            <pre>{{logs}}</pre>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.getElementById('themeToggle');
            btn.textContent = document.body.classList.contains('dark')
                ? "☀️ Light Mode"
                : "🌙 Dark Mode";
        }
    </script>
</body>
</html>
