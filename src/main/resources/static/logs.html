<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOB Uptime Monitor – Logs</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
  <aside class="sidebar">
    <h2>FOB Uptime Monitor</h2>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="admin.html">Admin</a>
      <a class="active" href="logs.html">Logs</a>
      <a href="settings.html">Settings</a>
    </nav>
    <div class="theme-toggle">
      <label>
        <input type="checkbox" id="themeSwitch">
        Dark mode
      </label>
    </div>
  </aside>

  <main class="content">
    <header>
      <h1>Event Logs</h1>
      <p>Recent checks, alerts, and status changes.</p>
    </header>

    <table id="logsTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>URL</th>
          <th>Level</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="logsTableBody"></tbody>
    </table>

    <footer>
      <span id="logsUpdated">Last updated: —</span>
      <button id="logsRefreshBtn">Refresh</button>
    </footer>
  </main>

<script>
const API_BASE = window.location.origin;

// dark mode
const themeSwitch = document.getElementById("themeSwitch");
const savedTheme = localStorage.getItem("fob-theme");
if (savedTheme === "dark") {
  document.body.classList.add("dark");
  themeSwitch.checked = true;
}
themeSwitch.addEventListener("change", () => {
  if (themeSwitch.checked) {
    document.body.classList.add("dark");
    localStorage.setItem("fob-theme", "dark");
  } else {
    document.body.classList.remove("dark");
    localStorage.setItem("fob-theme", "light");
  }
});

function formatTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleString();
}

function loadLogs() {
  fetch(`${API_BASE}/api/logs`)
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById("logsTableBody");
      tbody.innerHTML = "";
      data.forEach(log => {
        tbody.innerHTML += `
          <tr>
            <td>${formatTime(log.timestamp)}</td>
            <td>${log.url || ""}</td>
            <td>${log.level || ""}</td>
            <td>${log.message || ""}</td>
          </tr>`;
      });
      document.getElementById("logsUpdated").innerText =
        "Last updated: " + new Date().toLocaleTimeString();
    })
    .catch(err => console.error("Logs error:", err));
}

document.getElementById("logsRefreshBtn").addEventListener("click", loadLogs);

loadLogs();
</script>

</body>
</html>
