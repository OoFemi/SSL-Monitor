<!DOCTYPE html>
<html>
<head>
  <title>Admin – FOB Monitor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav class="top-nav">
  <a href="/overview.html">Overview</a>
  <a href="/admin.html">Admin</a>
  <a href="/dashboard.html">Dashboard</a>
  <a href="/logs.html">Logs</a>

<h1>Admin / Settings</h1>

<h2 style="margin-left:20px;">Add or Edit URL</h2>

<form id="urlForm" style="margin-left:20px;">
  <input type="hidden" id="urlId">

  <input type="text" id="urlInput" placeholder="https://example.com" required>
  <input type="text" id="categoryInput" placeholder="Category">
  <input type="text" id="tagsInput" placeholder="tag1, tag2">

  <button type="submit">Save</button>
  <button type="button" id="cancelEdit" style="display:none;background:#6b7280;">Cancel</button>
</form>

<h2 style="margin-left:20px;">Monitored URLs</h2>

<table id="adminTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>URL</th>
      <th>Category</th>
      <th>Tags</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div style="text-align:center;margin:20px;">
  <button id="prevPage">Prev</button>
  <span id="pageInfo"></span>
  <button id="nextPage">Next</button>
</div>

<script src="/admin.js"></script>
</body>
</html>
